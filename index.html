<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>🎨 Custom Greeting Card Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ===== RESET & BODY ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== CONTAINER - FIXED SPACING ===== */
        .container {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== PREVIEW SECTION ===== */
        .preview-section {
            flex: 1 1 45%;
            min-width: 350px;
            max-width: 600px;
        }

        .preview-section h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-section h2 i {
            color: #e94560;
        }

        /* ===== GREETING CARD ===== */
        .greeting-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            background-color: #ffb6c1;
        }

        .petal {
            position: absolute;
            font-size: 45px;
            opacity: 0.12;
            user-select: none;
            pointer-events: none;
        }

        .greeting-text {
            font-weight: 700;
            z-index: 1;
            line-height: 1.2;
            word-wrap: break-word;
            max-width: 90%;
            color: #8B00FF;
            font-size: 56px;
        }

        .divider-line {
            width: 80px;
            height: 4px;
            border-radius: 10px;
            margin: 15px 0;
            z-index: 1;
            background-color: #8B00FF;
        }

        .proverb-text {
            font-weight: 600;
            z-index: 1;
            line-height: 1.5;
            max-width: 85%;
            word-wrap: break-word;
            color: #8B00FF;
            font-size: 24px;
        }

        .author-text {
            font-weight: 500;
            margin-top: 10px;
            opacity: 0.8;
            z-index: 1;
            color: #7B00E6;
            font-size: 18px;
        }

        /* ===== CONTROLS SECTION ===== */
        .controls-section {
            flex: 1 1 45%;
            min-width: 350px;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-height: 90vh;
            overflow-y: auto;
            align-self: flex-start;
        }

        .controls-section::-webkit-scrollbar {
            width: 6px;
        }
        .controls-section::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 10px;
        }

        .controls-section h2 {
            color: #fff;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .controls-section .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #ddd;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #e94560;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 50px;
        }

        .form-group input[type="color"] {
            padding: 4px;
            height: 45px;
            cursor: pointer;
        }

        .form-group input[type="range"] {
            padding: 0;
            accent-color: #e94560;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            -webkit-appearance: none;
        }

        .form-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .form-group input[type="file"] {
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .form-group input[type="file"]::file-selector-button {
            padding: 6px 16px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }

        .color-row {
            display: flex;
            gap: 12px;
        }

        .color-row .form-group {
            flex: 1;
        }

        /* ===== STYLE BUTTONS ===== */
        .style-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
