<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Morning Greeting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2d2d2d;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Main Greeting Card - Rose/Pink Background */
        .greeting-card {
            width: 800px;
            height: 800px;
            background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 50%, #ff1493 100%);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 20, 147, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Decorative Rose Petals */
        .petal {
            position: absolute;
            font-size: 60px;
            opacity: 0.15;
            user-select: none;
            pointer-events: none;
        }

        .petal-1 { top: 20px; left: 30px; transform: rotate(-20deg); font-size: 80px; }
        .petal-2 { top: 50px; right: 40px; transform: rotate(40deg); }
        .petal-3 { bottom: 40px; left: 50px; transform: rotate(15deg); }
        .petal-4 { bottom: 30px; right: 30px; transform: rotate(-30deg); font-size: 80px; }
        .petal-5 { top: 50%; left: 10px; transform: rotate(-10deg); font-size: 45px; }
        .petal-6 { top: 30%; right: 15px; transform: rotate(25deg); font-size: 45px; }

        /* "Good Morning" - Bold Violet */
        .greeting-title {
            font-size: 72px;
            font-weight: 900;
            color: #8B00FF;
            text-shadow: 0 4px 20px rgba(139, 0, 255, 0.3);
            letter-spacing: 2px;
            margin-bottom: 30px;
            z-index: 1;
        }

        /* Proverb - Bold Violet */
        .proverb {
            font-size: 36px;
            font-weight: 800;
            color: #8B00FF;
            text-shadow: 0 2px 15px rgba(139, 0, 255, 0.25);
            line-height: 1.5;
            max-width: 600px;
            z-index: 1;
        }

        .proverb span {
            display: block;
            font-size: 28px;
            font-weight: 700;
            margin-top: 20px;
            opacity: 0.9;
            color: #7B00E6;
        }

        /* Small decorative line */
        .divider {
            width: 120px;
            height: 4px;
            background: #8B00FF;
            border-radius: 10px;
            margin: 20px 0;
            opacity: 0.4;
            z-index: 1;
        }

        /* Alternative proverb styles */
        .proverb-alt {
            display: none;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .greeting-card {
                width: 95vw;
                height: 95vw;
                padding: 30px;
                border-radius: 20px;
            }
            .greeting-title {
                font-size: 48px;
            }
            .proverb {
                font-size: 26px;
                max-width: 90%;
            }
            .proverb span {
                font-size: 20px;
            }
            .petal {
                font-size: 40px !important;
            }
        }

        @media (max-width: 500px) {
            .greeting-title {
                font-size: 34px;
            }
            .proverb {
                font-size: 20px;
            }
            .proverb span {
                font-size: 16px;
            }
            .greeting-card {
                padding: 20px;
            }
        }

        /* Take Screenshot Hint */
        .hint {
            color: #888;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }

        .hint a {
            color: #ff69b4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <!-- Main Greeting Card -->
        <div class="greeting-card" id="greetingCard">

            <!-- Rose Petal Decorations -->
            <div class="petal petal-1">🌸</div>
            <div class="petal petal-2">🌹</div>
            <div class="petal petal-3">🌸</div>
            <div class="petal petal-4">🌹</div>
            <div class="petal petal-5">🌺</div>
            <div class="petal petal-6">🌺</div>

            <!-- Good Morning -->
            <div class="greeting-title">✨ Good Morning ✨</div>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Proverb in Bold Violet -->
            <div class="proverb">
                "Believe you can, and you're already halfway there."
                <span>— Theodore Roosevelt</span>
            </div>

        </div>

        <!-- Instructions -->
        <div class="hint">
            📸 Right-click → "Save as Image" or take a screenshot<br />
            Made with ❤️ — <a href="#" onclick="changeProverb(); return false;">Click here</a> to change proverb
        </div>
    </div>

    <script>
        // Array of confidence proverbs
        const proverbs = [
            {
                text: '"Believe you can, and you\'re already halfway there."',
                author: '— Theodore Roosevelt'
            },
            {
                text: '"She believed she could, so she did."',
                author: '— Unknown'
            },
            {
                text: '"Your only limit is your mind."',
                author: '— Unknown'
            },
            {
                text: '"Strength grows in the moments you think you can\'t go on."',
                author: '— Unknown'
            },
            {
                text: '"You are braver than you believe, stronger than you seem."',
                author: '— A.A. Milne'
            },
            {
                text: '"Success is not final, failure is not fatal: it is the courage to continue that counts."',
                author: '— Winston Churchill'
            }
        ];

        let currentIndex = 0;

        function changeProverb() {
            currentIndex = (currentIndex + 1) % proverbs.length;
            const p = proverbs[currentIndex];
            const proverbEl = document.querySelector('.proverb');
            proverbEl.innerHTML = `${p.text} <span>${p.author}</span>`;
        }
    </script>
</body>
</html>
