<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎨 Custom Greeting Card Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ===== RESET & BODY ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== CONTAINER - FIXED SPACING ===== */
        .container {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== PREVIEW SECTION ===== */
        .preview-section {
            flex: 1 1 45%;
            min-width: 350px;
            max-width: 600px;
        }

        .preview-section h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-section h2 i {
            color: #e94560;
        }

        /* ===== GREETING CARD ===== */
        .greeting-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            background-color: #ffb6c1;
        }

        .petal {
            position: absolute;
            font-size: 45px;
            opacity: 0.12;
            user-select: none;
            pointer-events: none;
        }

        .greeting-text {
            font-weight: 700;
            z-index: 1;
            line-height: 1.2;
            word-wrap: break-word;
            max-width: 90%;
            color: #8B00FF;
            font-size: 56px;
        }

        .divider-line {
            width: 80px;
            height: 4px;
            border-radius: 10px;
            margin: 15px 0;
            z-index: 1;
            background-color: #8B00FF;
        }

        .proverb-text {
            font-weight: 600;
            z-index: 1;
            line-height: 1.5;
            max-width: 85%;
            word-wrap: break-word;
            color: #8B00FF;
            font-size: 24px;
        }

        .author-text {
            font-weight: 500;
            margin-top: 10px;
            opacity: 0.8;
            z-index: 1;
            color: #7B00E6;
            font-size: 18px;
        }

        /* ===== CONTROLS SECTION ===== */
        .controls-section {
            flex: 1 1 45%;
            min-width: 350px;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-height: 90vh;
            overflow-y: auto;
            align-self: flex-start;
        }

        .controls-section::-webkit-scrollbar {
            width: 6px;
        }
        .controls-section::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 10px;
        }

        .controls-section h2 {
            color: #fff;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .controls-section .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #ddd;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #e94560;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 50px;
        }

        .form-group input[type="color"] {
            padding: 4px;
            height: 45px;
            cursor: pointer;
        }

        .form-group input[type="range"] {
            padding: 0;
            accent-color: #e94560;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            -webkit-appearance: none;
        }

        .form-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .form-group input[type="file"] {
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .form-group input[type="file"]::file-selector-button {
            padding: 6px 16px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }

        .color-row {
            display: flex;
            gap: 12px;
        }

        .color-row .form-group {
            flex: 1;
        }

        /* ===== STYLE BUTTONS ===== */
        .style-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .style-buttons button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ddd;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .style-buttons button:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .style-buttons button.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
            color: #fff;
        }

        /* ===== BUTTONS ===== */
        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #c23152);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.3);
        }

        .btn-generate i {
            margin-right: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(46, 204, 113, 0.3);
        }

        .btn-share {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.3);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            flex: 0.3;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== MUSIC PLAYER ===== */
        .music-player {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: none;
        }

        .music-player.active {
            display: block;
        }

        .music-player audio {
            width: 100%;
            border-radius: 10px;
        }

        .music-info {
            color: #aaa;
            font-size: 13px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #fff;
            padding: 15px 35px;
            border-radius: 15px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(46, 204, 113, 0.3);
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #e74c3c;
            box-shadow: 0 10px 40px rgba(231, 76, 60, 0.3);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }
            .preview-section {
                flex: 1 1 100%;
                max-width: 500px;
                width: 100%;
            }
            .controls-section {
                flex: 1 1 100%;
                max-width: 100%;
                width: 100%;
                max-height: none;
                align-self: auto;
            }
            .greeting-card {
                max-width: 100%;
            }
            .greeting-text {
                font-size: 36px;
            }
            .proverb-text {
                font-size: 18px;
            }
            .greeting-card {
                padding: 25px;
            }
        }

        @media (max-width: 500px) {
            .greeting-text {
                font-size: 26px;
            }
            .proverb-text {
                font-size: 15px;
            }
            .greeting-card {
                padding: 18px;
                border-radius: 18px;
            }
            .controls-section {
                padding: 18px;
            }
            .color-row {
                flex-direction: column;
                gap: 0;
            }
            .action-buttons {
                flex-direction: column;
            }
            body {
                padding: 15px 10px;
            }
        }
    </style>
</head>
